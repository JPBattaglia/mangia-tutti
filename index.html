<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mangia Tutti</title>
  <meta name="description" content="Official website notice for Mangia Tutti.">
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(176,141,87,.18), transparent 35%),
        linear-gradient(180deg, #171a20 0%, #0f1115 100%);
      color: #f5f1e8;
    }

    body {  
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      margin-top: 75px;
      justify-content: center;
      align-items: center;  
      width: min(820px, 100%);
      background: rgba(255,255,255,.08);
      border: 3px solid rgba(0, 136, 47, 0.739);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      padding: 56px 32px 42px;
      text-align: center;
    }

    .logo-row {
      display: grid;
      place-items: center;
      margin-bottom: 36px;
    }

    .logo-shell {
      width: min(430px, 80vw);
      display: grid;
      place-items: center;
    }

    .logo {
      display: block;
      max-width: 100%;
      height: auto;
      filter: drop-shadow(1px 0px 1px white);
    }

    h1 {
      margin:0;
      font-size: 40px;
      line-height: 1.05;
      font-weight: 600;
    }

    .divider {
      width: 72px;
      height: 2px;
      margin: 28px auto 24px;
      background: linear-gradient(90deg, transparent, #b08d57, transparent);
    }

    p {
      margin: 0 auto 16px;
      max-width: 560px;
      font-size: 18px;
      line-height: 1.7;
      color: #c9c2b5;
    }

    .tall-text {
      display: inline-block;
      transform: scaleY(1.5); /* Makes text 2x taller */
    }

    .small {
      margin-top: 28px;
      font-size: 14px;
      color: rgba(245,241,232,.62);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo-row">
      <div class="logo-shell">
        <img class="logo" src="MangiaTutterLogoRedo Transparent.png" alt="Mangia Tutti logo">
      </div>
    </div>

    <h1 class="tall-text" style="letter-spacing: 1px;font-style: oblique;font-stretch: ultra-expanded;">Closed Down</h1>
    <div class="divider"></div>

    <p style="color:rgb(245, 83, 83); font-weight: bolder;">This business is no longer operating.</p>
    <p>This website is being maintained temporarily only as a closure notice while the domain remains active.</p>
    <p class="small">Thank you to everyone who supported Mangia Tutti over the years.</p>
  </main>
</body>
</html>
